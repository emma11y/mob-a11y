<div class="checkout-container">
  <div class="checkout-content">
    <div class="checkout-main">
      <h2 class="title">Finaliser votre commande</h2>

      <!-- Shipping Information -->
      <section class="checkout-section">
        <h3 class="section-title">Adresse de livraison</h3>
        <form id="shipping-form" class="form-group">
          <div class="form-row">
            <div class="form-field">
              <label for="firstName">Prénom</label>
              <input type="text" id="firstName" name="firstName" required />
            </div>
            <div class="form-field">
              <label for="lastName">Nom</label>
              <input type="text" id="lastName" name="lastName" required />
            </div>
          </div>
          <div class="form-field">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              aria-describedby="format-email"
            />
          </div>
          <div class="form-field">
            <label for="phone">Téléphone</label>
            <input type="tel" id="phone" name="phone" required maxlength="10" />
          </div>
          <div class="form-field">
            <label for="address">Adresse</label>
            <input type="text" id="address" name="address" required />
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="zipcode">Code postal</label>
              <input
                type="text"
                id="zipcode"
                name="zipcode"
                maxlength="5"
                required
              />
            </div>
            <div class="form-field">
              <label for="city">Ville</label>
              <input type="text" id="city" name="city" required />
            </div>
          </div>
          <div class="form-field">
            <label for="country">Pays</label>
            <select id="country" name="country" required>
              <option value=""></option>
              <option value="france">France</option>
              <option value="belgique">Belgique</option>
              <option value="suisse">Suisse</option>
              <option value="luxembourg">Luxembourg</option>
            </select>
          </div>
        </form>
      </section>

      <!-- Payment Information -->
      <section class="checkout-section">
        <h3 class="section-title">Informations de paiement</h3>
        <form id="payment-form" class="form-group">
          <div class="form-field">
            <label for="cardName">Nom sur la carte</label>
            <input type="text" id="cardName" name="cardName" required />
          </div>
          <div class="form-field">
            <label for="cardNumber">Numéro de carte</label>
            <input
              type="text"
              id="cardNumber"
              name="cardNumber"
              placeholder="0000 0000 0000 0000"
              maxlength="19"
              required
            />
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="expiry">Expiration (MM/YY)</label>
              <input
                type="text"
                id="expiry"
                name="expiry"
                placeholder="MM/YY"
                maxlength="5"
                required
              />
            </div>
            <div class="form-field">
              <label for="cvv">CVV</label>
              <input
                type="text"
                id="cvv"
                name="cvv"
                placeholder="000"
                maxlength="3"
                required
              />
            </div>
          </div>
        </form>
      </section>
    </div>

    <!-- Order Summary Sidebar -->
    <aside class="checkout-sidebar">
      <div class="order-summary">
        <h2 class="summary-title">Résumé de la commande</h2>
        <div id="cart-items" class="cart-items" role="list"></div>
        <div class="summary-divider"></div>
        <div class="summary-row subtotal">
          <span>Sous-total</span>
          <span id="subtotal">0,00 €</span>
        </div>
        <div class="summary-row shipping">
          <span>Livraison</span>
          <span id="shipping">Gratuit</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="total">0,00 €</span>
        </div>
        <div class="summary-actions">
          <button type="submit" class="pay-button" data-testid="pay-button">
            <span>Payer</span>
          </button>

          <a href="/produits" class="continue-shopping">Continuer les achats</a>
        </div>
      </div>
    </aside>
  </div>

  <!-- Empty Cart Message -->
  <div id="empty-cart" class="empty-cart" style="display: none">
    <div class="empty-content">
      <h3>Votre panier est vide</h3>
      <p>Ajoutez des produits avant de continuer</p>
      <a href="/produits" class="empty-link">Retour aux produits</a>
    </div>
  </div>
</div>
