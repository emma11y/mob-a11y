<div class="checkout-container">
  <div class="checkout-content">
    <div class="checkout-main">
      <h1 class="checkout-title">Finaliser votre commande</h1>

      <!-- Shipping Information -->
      <section class="checkout-section">
        <h2 class="section-title">Adresse de livraison</h2>
        <form id="shipping-form" class="form-group">
          <div class="form-row">
            <div class="form-field">
              <label>Prénom</label>
              <input type="text" id="firstName" name="firstName" required />
            </div>
            <div class="form-field">
              <label>Nom</label>
              <input type="text" id="lastName" name="lastName" required />
            </div>
          </div>
          <div class="form-field">
            <label>Email</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              aria-describedby="format-email"
            />
          </div>
          <div class="form-field">
            <label>Téléphone</label>
            <input type="tel" id="phone" name="phone" required maxlength="10" />
          </div>
          <div class="form-field">
            <label>Adresse</label>
            <input type="text" id="address" name="address" required />
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>Code postal</label>
              <input
                type="text"
                id="zipcode"
                name="zipcode"
                maxlength="5"
                required
              />
            </div>
            <div class="form-field">
              <label>Ville</label>
              <input type="text" id="city" name="city" required />
            </div>
          </div>
          <div class="form-field">
            <label for="country">Pays</label>
            <div class="country-dropdown" id="country" role="listbox" required>
              <div class="country-selected"></div>
              <div class="country-options">
                <div role="option" class="country-option">France</div>
                <div role="option" class="country-option">Belgique</div>
                <div role="option" class="country-option">Suisse</div>
                <div role="option" class="country-option">Luxembourg</div>
              </div>
            </div>
          </div>
        </form>
      </section>

      <!-- Payment Information -->
      <section class="checkout-section">
        <h2 class="section-title">Informations de paiement</h2>
        <form id="payment-form" class="form-group">
          <div class="form-field">
            <label>Nom sur la carte</label>
            <input type="text" id="cardName" name="cardName" required />
          </div>
          <div class="form-field">
            <label>Numéro de carte</label>
            <input
              type="text"
              id="cardNumber"
              name="cardNumber"
              placeholder="0000 0000 0000 0000"
              maxlength="19"
              required
            />
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>Expiration (MM/YY)</label>
              <input
                type="text"
                id="expiry"
                name="expiry"
                placeholder="MM/YY"
                maxlength="5"
                required
              />
            </div>
            <div class="form-field">
              <label>CVV</label>
              <input
                type="text"
                id="cvv"
                name="cvv"
                placeholder="000"
                maxlength="3"
                required
              />
            </div>
          </div>
        </form>
      </section>
    </div>

    <!-- Order Summary Sidebar -->
    <aside class="checkout-sidebar">
      <div class="order-summary">
        <h2 class="summary-title">Résumé de la commande</h2>
        <div id="cart-items" class="cart-items"></div>
        <div class="summary-divider"></div>
        <div class="summary-row subtotal">
          <span>Sous-total</span>
          <span id="subtotal">0,00 €</span>
        </div>
        <div class="summary-row shipping">
          <span>Livraison</span>
          <span id="shipping">Gratuit</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="total">0,00 €</span>
        </div>
        <div class="summary-actions">
          <button type="submit" class="pay-button" data-testid="pay-button">
            <span>Payer</span>
          </button>

          <a href="./produits" class="continue-shopping">Continuer les achats</a>
        </div>
      </div>
    </aside>
  </div>

  <!-- Empty Cart Message -->
  <div id="empty-cart" class="empty-cart" style="display: none">
    <div class="empty-content">
      <h2>Votre panier est vide</h2>
      <p>Ajoutez des produits avant de continuer</p>
      <a href="./produits" class="empty-link">Retour aux produits</a>
    </div>
  </div>

  <div
    role="alert"
    class="alert"
    aria-live="polite"
    aria-relevant="additions text"
  ></div>
</div>
